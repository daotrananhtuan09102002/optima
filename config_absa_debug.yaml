model: gpt-4o-mini
operator_model: gpt-4o-mini
task_model_name: google/flan-t5-base
population_size: 6
generations: 2
num_runs: 1
task_type: absa
dataset_source: local
dataset_name: laptop14
optimization_split: validation
train_sample_size: 24
validation_sample_size: 30
test_sample_size: 30
local_train_path: data/laptop14/train.jsonl
local_validation_path: data/laptop14/validation.jsonl
local_test_path: data/laptop14/test.jsonl
text_field: sentence
aspect_field: aspect
label_field: label
label_space:
  - positive
  - negative
  - neutral
  - conflict
shuffle_seed: 42
temperature: 0.7
operator_temperature: 0.9
max_generation_tokens: 400
max_examples: 2
task_model_train_epochs: 1.0
task_model_learning_rate: 5.0e-5
task_model_train_batch_size: 2
task_model_eval_batch_size: 4
task_model_max_source_length: 512
task_model_max_target_length: 16
task_model_generation_max_new_tokens: 8
task_model_device: auto
perplexity_model_name: roberta-base
random_replacement_ratio: 0.0
minimization_objectives: |
  - Minimize the instruction performance objective value.
  - Minimize the instruction length.
  - Minimize the instruction perplexity.
